<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>2026 World Cup — Knockout Bracket</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="midnight"] {
    --bg: #0b1020;
    --bg-2: #0f1530;
    --panel: #141b38;
    --line: #232c52;
    --line-2: #2e3a6b;
    --ink: #e9ecf5;
    --ink-dim: #9aa3c4;
    --ink-mute: #6b75a0;
    --amber: #f5a524;
    --amber-soft: rgba(245, 165, 36, 0.14);
    --green: #38d39f;
    --rose: #ff6c8a;
  }

  [data-theme="pitch"] {
    --bg: #0a1a10;
    --bg-2: #0e2117;
    --panel: #11291c;
    --line: #1f3a2a;
    --line-2: #2c4c39;
    --ink: #eaf4ec;
    --ink-dim: #9bb7a4;
    --ink-mute: #6d8a78;
    --amber: #c8e85a;
    --amber-soft: rgba(200, 232, 90, 0.16);
  }

  [data-theme="mono"] {
    --bg: #0a0a0a;
    --bg-2: #111111;
    --panel: #161616;
    --line: #232323;
    --line-2: #353535;
    --ink: #ededed;
    --ink-dim: #a0a0a0;
    --ink-mute: #6a6a6a;
    --amber: #ff5a36;
    --amber-soft: rgba(255, 90, 54, 0.14);
  }

  [data-theme="ivory"] {
    --bg: #f4efe6;
    --bg-2: #ece6da;
    --panel: #ffffff;
    --line: #d8d0c0;
    --line-2: #b8ad99;
    --ink: #1a1a1a;
    --ink-dim: #555248;
    --ink-mute: #8a8475;
    --amber: #b5371a;
    --amber-soft: rgba(181, 55, 26, 0.10);
  }
  [data-theme="ivory"] .viewport::before {
    background-image:
      linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
  }
  [data-theme="ivory"] header.bar {
    background: linear-gradient(180deg, #faf6ee, var(--bg));
  }
  [data-theme="ivory"] .match.final {
    background: linear-gradient(180deg, #fff8ec, #fdf3e0) !important;
  }
  [data-theme="ivory"] .match:hover {
    background: #fbf7ee;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Space Grotesk", sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ---------- App chrome ---------- */
  .app {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }

  header.bar {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #0d1226, var(--bg));
    z-index: 10;
    flex-wrap: wrap;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand .mark {
    width: 36px;
    height: 36px;
    border: 1.5px solid var(--ink);
    border-radius: 50%;
    position: relative;
    flex-shrink: 0;
  }
  .brand .mark::before, .brand .mark::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }
  .brand .mark::before {
    border-top: 1.5px solid var(--ink);
    transform: rotate(63.4deg);
    border-left: 1.5px solid var(--ink);
    border-right: 1.5px solid transparent;
    border-bottom: 1.5px solid transparent;
  }
  .brand .mark::after {
    background: radial-gradient(circle at 50% 50%, var(--amber) 0, var(--amber) 3px, transparent 4px);
  }
  .brand .title {
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .brand .sub {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-mute);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .zoom-controls {
    display: flex;
    gap: 6px;
    background: var(--bg-2);
    padding: 4px;
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .zoom-btn {
    background: transparent;
    border: 0;
    color: var(--ink-dim);
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .zoom-btn:hover {
    color: var(--ink);
    background: rgba(255,255,255,0.04);
  }
  .zoom-btn.active {
    color: #1a1206;
    background: var(--amber);
    font-weight: 600;
  }
  .overview-btn {
    background: var(--bg-2);
    border: 1px solid var(--line);
  }
  .overview-btn:hover {
    border-color: var(--line-2);
  }
  .zoom-quick {
    display: flex;
    gap: 6px;
  }

  .meta {
    display: flex;
    gap: 24px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 0.05em;
  }
  .meta b { color: var(--ink); font-weight: 500; }

  /* ---------- TZ picker ---------- */
  .tz-picker {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
    padding-right: 6px;
  }
  .tz-picker .label {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-mute);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .tz-select-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
  }
  .tz-select-wrap select {
    appearance: none;
    -webkit-appearance: none;
    background: var(--bg-2);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 24px 7px 10px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.03em;
    cursor: pointer;
    min-width: 150px;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .tz-select-wrap select:hover, .tz-select-wrap select:focus {
    border-color: var(--line-2);
  }
  .tz-select-wrap select option { background: var(--bg-2); color: var(--ink); }
  .tz-select-wrap .caret {
    position: absolute;
    right: 9px;
    pointer-events: none;
    color: var(--ink-mute);
    font-size: 10px;
  }
  .tz-picker .offset {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--amber);
    letter-spacing: 0.06em;
    min-width: 60px;
  }

  /* ---------- Theme swatches ---------- */
  .theme-picker {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-left: 4px;
    padding-right: 4px;
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    padding: 4px 12px;
    height: 34px;
  }
  .theme-picker .label {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-mute);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-right: 2px;
  }
  .swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    border: 1.5px solid transparent;
    transition: transform 0.15s ease, border-color 0.15s ease;
    overflow: hidden;
    flex-shrink: 0;
    display: block;
    padding: 0;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.active {
    border-color: var(--ink);
    transform: scale(1.08);
  }
  .swatch::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 50%;
  }

  /* ---------- Bracket viewport ---------- */
  .viewport {
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(245,165,36,0.05), transparent 60%),
      var(--bg);
  }
  .viewport::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .stage {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0;
    transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1);
    will-change: transform;
  }

  /* ---------- Bracket layout ---------- */
  /* CSS variables set per layout */
  :root {
    --col-w: 240px;
    --col-gap: 28px;
    --match-h: 64px;
    --r32-gap: 14px;
  }

  .bracket {
    position: relative;
    padding: 60px 60px;
    display: flex;
    align-items: stretch;
    gap: var(--col-gap);
  }
  .col {
    display: flex;
    flex-direction: column;
    width: var(--col-w);
    position: relative;
  }
  .col-header {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-mute);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px dashed var(--line);
  }
  .col-header .label { color: var(--ink); font-weight: 600; }
  .col-header .dates { display: block; margin-top: 4px; color: var(--ink-mute); }

  .matches { display: flex; flex-direction: column; flex: 1; justify-content: space-around; }

  /* ---------- Match card ---------- */
  .match {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px 8px 10px;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .match::before {
    content: attr(data-id);
    position: absolute;
    top: -8px;
    left: 10px;
    background: var(--bg);
    color: var(--ink-mute);
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 1px 6px;
    border-radius: 3px;
    border: 1px solid var(--line);
    display: none;
  }
  .match:hover {
    border-color: var(--line-2);
    background: #181f40;
    transform: translateY(-1px);
  }
  .match.focused {
    border-color: var(--amber);
    background: linear-gradient(180deg, var(--panel), #1a1a2c);
    box-shadow: 0 0 0 3px var(--amber-soft);
  }

  .meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 9.5px;
    color: var(--ink-mute);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    min-height: 12px;
  }
  .meta-row .date-time { color: var(--ink-dim); white-space: nowrap; }
  .meta-row .venue {
    display: flex;
    align-items: center;
    gap: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .meta-row .venue .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--ink-mute);
    flex-shrink: 0;
  }
  .meta-row .time { color: var(--ink-dim); flex-shrink: 0; }

  .teams { display: flex; flex-direction: column; gap: 2px; }
  .teams { gap: 3px; }
  .team {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 2px 0;
  }
  .team.won .name { color: var(--amber); font-weight: 600; }
  .team.won .seed { background: color-mix(in srgb, var(--amber) 20%, transparent); color: var(--amber); }
  .team.eliminated .name { color: var(--ink-mute); text-decoration: line-through; text-decoration-color: var(--ink-mute); }
  .team.eliminated .seed { opacity: 0.5; }
  .team .seed {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    color: var(--ink-dim);
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-weight: 600;
    letter-spacing: 0;
    display: none;
  }
  .team .name {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ko-score {
    min-width: 20px;
    height: 20px;
    border-radius: 5px;
    background: var(--bg);
    border: 1px solid var(--line-2);
    color: var(--ink);
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .team.won .ko-score {
    background: var(--amber);
    border-color: var(--amber);
    color: #1a1206;
  }
  .ko-method {
    align-self: flex-end;
    margin-top: -1px;
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    color: var(--ink-mute);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .team .name.placeholder {
    color: var(--ink-mute);
    font-style: italic;
    font-weight: 400;
  }
  .match.compact .meta-row { display: none; }
  .match.compact .team .seed { width: 14px; height: 14px; font-size: 8px; }
  .match.compact .team .name { font-size: 10.5px; }
  .match.compact { padding: 6px 8px; gap: 2px; }
  .match.compact::before { font-size: 8px; padding: 1px 4px; }



  /* ---------- Connector SVG ---------- */
  svg.connectors {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    overflow: visible;
  }
  svg.connectors path {
    stroke: var(--line-2);
    stroke-width: 1.2;
    fill: none;
    transition: stroke 0.3s ease;
  }
  svg.connectors path.highlight { stroke: var(--amber); stroke-width: 1.6; }

  /* ---------- Final + third place special ---------- */
  .match.final {
    border-color: var(--amber) !important;
    background: color-mix(in srgb, var(--panel) 70%, var(--amber) 8%) !important;
  }
  .match.final::before {
    background: var(--amber);
    color: var(--bg);
    border-color: var(--amber);
    font-weight: 700;
  }
  .match.third {
    background: transparent !important;
    border: 1px dashed var(--line-2) !important;
  }

  /* Legacy final-col rules (kept for safety) */
  .final-col { width: 280px; }
  .final-col .col-header { margin-bottom: 24px; }
  .final-col .match.final {
    border-color: var(--amber);
    background: linear-gradient(180deg, #1a1530, #16193a);
  }
  .final-col .match.final::before {
    background: var(--amber);
    color: #1a1206;
    border-color: var(--amber);
    font-weight: 700;
  }
  .final-col .match.final .team .name { font-size: 13px; }
  .final-col .match.third {
    border-style: dashed;
    background: transparent;
    margin-top: 60px;
  }
  .final-col .match.third::before {
    content: 'M104 · 3rd PLACE';
    color: var(--ink-mute);
  }

  /* ---------- Side panel ---------- */
  .side-panel {
    position: absolute;
    right: 20px;
    top: 20px;
    width: 280px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px;
    z-index: 20;
    backdrop-filter: blur(8px);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .side-panel.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(-8px);
  }
  .sp-id {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--amber);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .sp-round {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-mute);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .sp-divider {
    height: 1px;
    background: var(--line);
    margin: 14px 0;
  }
  .sp-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 12px;
  }
  .sp-row .lbl {
    color: var(--ink-mute);
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .sp-row .val { color: var(--ink); font-weight: 500; }
  .sp-teams {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 12px;
  }
  .sp-score {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: end;
    gap: 10px;
    margin: 4px 0 6px;
  }
  .sp-result {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: -2px 0 10px;
    font-family: "JetBrains Mono", monospace;
  }
  .sp-result span {
    color: var(--ink);
    font-size: 18px;
    font-weight: 700;
  }
  .sp-result b {
    color: var(--amber);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .sp-side { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .sp-side-name {
    font-family: "Space Grotesk", sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .sp-score input {
    width: 100%;
    height: 44px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--ink);
    font-family: "JetBrains Mono", monospace;
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    -moz-appearance: textfield;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .sp-score input::-webkit-outer-spin-button,
  .sp-score input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .sp-score input:focus { border-color: var(--amber); }
  .sp-score input:disabled { color: var(--ink-mute); cursor: not-allowed; }
  .sp-dash {
    color: var(--ink-mute);
    font-family: "JetBrains Mono", monospace;
    font-size: 20px;
    padding-bottom: 8px;
  }
  .sp-pens {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--bg-2);
    border: 1px dashed var(--line-2);
    border-radius: 6px;
  }
  .sp-pens-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 9.5px;
    color: var(--ink-mute);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 6px;
  }
  .sp-pens-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }
  .sp-pens-row input {
    width: 50px;
    height: 32px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 5px;
    color: var(--amber);
    font-family: "JetBrains Mono", monospace;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    -moz-appearance: textfield;
    outline: none;
  }
  .sp-pens-row input::-webkit-outer-spin-button,
  .sp-pens-row input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .sp-pens-row input:focus { border-color: var(--amber); }
  .sp-team {
    padding: 10px 12px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 6px;
  }
  .sp-team .nm { font-weight: 600; font-size: 13px; }
  .sp-team .src {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-mute);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }
  .sp-close {
    position: absolute;
    top: 14px;
    right: 14px;
    background: transparent;
    border: 0;
    color: var(--ink-mute);
    cursor: pointer;
    font-size: 18px;
    padding: 0;
    line-height: 1;
  }
  .sp-close:hover { color: var(--ink); }

  /* ---------- Mini-map / legend bottom-left ---------- */
  .legend {
    position: absolute;
    left: 20px;
    bottom: 20px;
    background: color-mix(in srgb, var(--panel) 90%, transparent);
    backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    z-index: 15;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.06em;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .legend .row { display: flex; align-items: center; gap: 8px; }
  .legend .sw { width: 10px; height: 10px; border-radius: 2px; }

  /* ---------- Teams view ---------- */

  @media (max-width: 640px) {

      max-width: none;
      width: 100%;

      display: block;

    }
    .tv-table thead,
    .tv-table tbody {
      display: block;
    }
    .tv-table tr {
      display: grid;
      grid-template-columns:
        clamp(44px, 13vw, 64px)

        clamp(92px, 26vw, 118px)
        clamp(42px, 11vw, 52px);
      align-items: center;
    }
    .tv-table th, .tv-table td {
      display: block;
      width: auto !important;
      min-width: 0;

      border-bottom: 1px solid color-mix(in srgb, var(--line) 60%, transparent);
    }

      font-size: clamp(8px, 2.4vw, 10px);

      border-left: 0;

      border-radius: 0;
    }
    .tv-table tr {
      grid-template-columns:
        clamp(34px, 10vw, 40px)

  .tv-squad-modal {
